<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Wedding Entry"/>
<link rel="manifest" href="manifest.json"/>
<title>Wedding Entry</title>
<script>
function loadScript(urls){
  var i=0;
  function next(){if(i>=urls.length)return;var s=document.createElement('script');s.src=urls[i++];s.onerror=next;document.head.appendChild(s);}
  next();
}
loadScript(['https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js','https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js']);
loadScript(['https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js','https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js','https://unpkg.com/jsqr@1.4.0/dist/jsQR.js']);
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --gold:#d4af37;--gdim:rgba(212,175,55,.25);--gfaint:rgba(212,175,55,.08);
  --bg:#0a0a0f;--sur:rgba(255,255,255,.03);
  --tx:#f0e6d3;--txd:#7a6a5a;--txm:#4a3a2a;
  --red:#e05555;--warn:#e0a030;--grn:#5eb87a;--blue:#7b9cff;
  --f:'Georgia','Times New Roman',serif;--m:'Courier New',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:var(--f);overscroll-behavior:none}
body{display:flex;flex-direction:column;min-height:100vh;min-height:-webkit-fill-available}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(ellipse at 20% 20%,rgba(212,175,55,.05)0%,transparent 60%),
             radial-gradient(ellipse at 80% 80%,rgba(100,50,150,.05)0%,transparent 60%)}
.app{display:flex;flex-direction:column;min-height:100vh;position:relative;z-index:1}
.hdr{background:rgba(0,0,0,.65);backdrop-filter:blur(12px);border-bottom:1px solid var(--gdim);
  padding:10px 16px;padding-top:max(10px,env(safe-area-inset-top));flex-shrink:0}
.hdr-ttl{font-size:17px;color:#f8f0e0;font-weight:normal}
.hdr-sub{font-size:9px;letter-spacing:3px;color:var(--gold);text-transform:uppercase}
.hdr-meta{font-size:10px;color:var(--txm);margin-top:1px;font-style:italic}
.tabs{display:flex;background:rgba(0,0,0,.4);border-bottom:1px solid rgba(212,175,55,.15);flex-shrink:0}
.tab{flex:1;padding:9px 2px;text-align:center;font-size:9px;letter-spacing:.5px;text-transform:uppercase;
  font-family:var(--f);color:var(--txd);border:none;background:none;cursor:pointer;border-bottom:2px solid transparent}
.tab.on{color:var(--gold);border-bottom-color:var(--gold);background:var(--gfaint)}
.ctrs{display:flex;border-bottom:1px solid rgba(212,175,55,.1);background:rgba(0,0,0,.3);flex-shrink:0}
.ctr{flex:1;padding:7px 2px;text-align:center;border-right:1px solid rgba(212,175,55,.1)}
.ctr:last-child{border-right:none}
.cv{font-size:19px;color:var(--gold);line-height:1}
.cs{font-size:8px;color:#5a4a3a}
.cl{font-size:7px;color:var(--txm);letter-spacing:.5px;text-transform:uppercase;margin-top:1px}
.main{flex:1;overflow-y:auto;padding:14px;padding-bottom:max(14px,env(safe-area-inset-bottom));-webkit-overflow-scrolling:touch}
.panel{background:var(--sur);border:1px solid var(--gdim);border-radius:12px;padding:20px 16px;position:relative;margin-bottom:14px}
.cn{position:absolute;width:13px;height:13px}
.cn.tl{top:8px;left:8px;border-top:2px solid var(--gold);border-left:2px solid var(--gold)}
.cn.tr{top:8px;right:8px;border-top:2px solid var(--gold);border-right:2px solid var(--gold)}
.cn.bl{bottom:8px;left:8px;border-bottom:2px solid var(--gold);border-left:2px solid var(--gold)}
.cn.br{bottom:8px;right:8px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold)}
@keyframes scanline{0%{top:10%}50%{top:85%}100%{top:10%}}
@keyframes tickIn{0%{transform:scale(.4);opacity:0}65%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.tick{width:74px;height:74px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  margin:0 auto 14px;font-size:32px;animation:tickIn .5s cubic-bezier(.175,.885,.32,1.275)}
.tick.tg{background:rgba(94,184,122,.12);border:2px solid var(--grn);color:var(--grn)}
.tick.tb{background:rgba(123,156,255,.12);border:2px solid var(--blue);color:var(--blue)}
.mtog{display:flex;background:rgba(0,0,0,.3);border:1px solid rgba(212,175,55,.2);border-radius:8px;margin-bottom:10px;overflow:hidden}
.mbtn{flex:1;padding:9px 4px;text-align:center;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-family:var(--f);color:var(--txd);border:none;background:none;cursor:pointer}
.mbtn.on{background:var(--gfaint);color:var(--gold)}
.atog{display:flex;gap:8px;margin-bottom:12px}
.abtn{flex:1;padding:10px 4px;text-align:center;font-size:11px;text-transform:uppercase;font-family:var(--f);border-radius:8px;cursor:pointer;border:none}
.abtn.ai{background:rgba(94,184,122,.12);border:1px solid rgba(94,184,122,.3);color:var(--grn)}
.abtn.ai.on{background:rgba(94,184,122,.25);border-color:var(--grn)}
.abtn.ao{background:rgba(123,156,255,.08);border:1px solid rgba(123,156,255,.25);color:var(--blue)}
.abtn.ao.on{background:rgba(123,156,255,.2);border-color:var(--blue)}
.cinp{width:100%;padding:12px;background:rgba(255,255,255,.05);border:1px solid rgba(212,175,55,.4);
  border-radius:6px;color:var(--tx);font-size:20px;text-align:center;letter-spacing:4px;
  text-transform:uppercase;outline:none;font-family:var(--m);caret-color:var(--gold)}
.sinp{width:100%;padding:11px 12px;background:rgba(255,255,255,.05);border:1px solid rgba(212,175,55,.3);
  border-radius:6px;color:var(--tx);font-size:14px;outline:none;font-family:var(--f);margin-bottom:10px;caret-color:var(--gold)}
.sinp:focus{border-color:var(--gold)}
.bp{display:block;width:100%;padding:13px;margin-top:10px;background:linear-gradient(135deg,#d4af37,#b8922a);
  border:none;border-radius:6px;color:#0a0a0f;font-size:13px;font-weight:bold;letter-spacing:3px;
  text-transform:uppercase;cursor:pointer;font-family:var(--f)}
.bp:active{opacity:.82}
.bp:disabled{opacity:.3;cursor:not-allowed}
.bx{display:block;width:100%;padding:13px;margin-top:10px;background:linear-gradient(135deg,#7b9cff,#5577ee);
  border:none;border-radius:6px;color:#fff;font-size:13px;font-weight:bold;letter-spacing:3px;
  text-transform:uppercase;cursor:pointer;font-family:var(--f)}
.bs{padding:10px 18px;background:transparent;border:1px solid var(--gdim);border-radius:6px;
  color:var(--gold);font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:var(--f)}
.bg{padding:11px;flex:1;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:6px;
  color:var(--txd);font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:var(--f)}
.bsm{padding:6px 12px;border-radius:4px;font-size:10px;letter-spacing:1px;text-transform:uppercase;font-family:var(--f);cursor:pointer;border:none}
.be{background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.4)!important;color:var(--gold)}
.bc{background:transparent;border:1px solid rgba(200,50,50,.3)!important;color:var(--red)}
.bq{background:rgba(212,175,55,.1);border:1px solid rgba(212,175,55,.3)!important;color:var(--gold);font-size:9px;padding:3px 8px}
.bd{background:transparent;border:1px solid rgba(200,50,50,.25)!important;color:var(--red);font-size:9px;padding:3px 8px}
.vrow{display:flex;align-items:center;justify-content:center;gap:18px;margin-bottom:18px}
.vb{width:42px;height:42px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid var(--gdim);color:var(--gold);font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.vn{font-size:44px;color:var(--tx);min-width:60px;text-align:center}
.pbar-wrap{margin:0 auto 12px;max-width:260px}
.pbar-top{display:flex;justify-content:space-between;margin-bottom:4px}
.pbar-bg{background:rgba(255,255,255,.08);border-radius:20px;height:7px;overflow:hidden}
.pbar-fill{height:100%;border-radius:20px}
.qgrid{display:flex;flex-wrap:wrap;gap:5px;justify-content:center}
.qb{padding:4px 8px;border-radius:4px;cursor:pointer;font-size:10px;font-family:var(--m)}
.qb.qi{background:rgba(212,175,55,.12);border:1px solid rgba(212,175,55,.4);color:var(--gold)}
.qb.qo{background:rgba(123,156,255,.1);border:1px solid rgba(123,156,255,.3);color:var(--blue)}
.qb.qn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);color:var(--txd)}
.fc{padding:12px 14px;border-radius:8px;margin-bottom:8px;background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07)}
.ec{padding:11px 14px;border-radius:8px;margin-bottom:8px}
.ec.en{background:var(--gfaint);border:1px solid var(--gdim)}
.ec.eo{background:rgba(255,255,255,.02);border:1px solid rgba(255,255,255,.07)}
.ec.ex2{background:rgba(123,156,255,.04);border:1px solid rgba(123,156,255,.18)}
.badge{font-size:9px;padding:2px 7px;border-radius:10px}
.bi{background:rgba(94,184,122,.15);color:var(--grn);border:1px solid rgba(94,184,122,.3)}
.bo{background:rgba(123,156,255,.12);color:var(--blue);border:1px solid rgba(123,156,255,.3)}
.bp2{background:rgba(255,255,255,.04);color:var(--txm);border:1px solid rgba(255,255,255,.08)}
.bf{background:rgba(224,85,85,.12);color:var(--red);border:1px solid rgba(224,85,85,.3)}
.ts-row{display:flex;gap:5px;margin-top:6px;flex-wrap:wrap}
.ts{font-size:9px;padding:2px 7px;border-radius:10px}
.ts.ti{background:rgba(94,184,122,.1);color:var(--grn);border:1px solid rgba(94,184,122,.22)}
.ts.to{background:rgba(123,156,255,.1);color:var(--blue);border:1px solid rgba(123,156,255,.22)}
.ts.td{background:rgba(212,175,55,.08);color:var(--gold);border:1px solid rgba(212,175,55,.18)}
.warn-box{padding:10px 13px;border-radius:8px;margin-bottom:12px;text-align:center}
.warn-box.ww{background:rgba(224,160,48,.1);border:1px solid rgba(224,160,48,.4)}
.warn-box.wr{background:rgba(224,85,85,.1);border:1px solid rgba(224,85,85,.4)}
.drop{border:2px dashed rgba(212,175,55,.3);border-radius:10px;padding:24px 16px;text-align:center;cursor:pointer;margin-bottom:10px}
.drop.ov{border-color:var(--gold);background:var(--gfaint)}
.tbox{background:rgba(0,0,0,.35);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:12px;margin-bottom:10px}
.tbox-t{font-size:9px;color:var(--txd);letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
.tbox-c{font-family:var(--m);font-size:11px;color:#a09070;line-height:1.7;white-space:pre;overflow-x:auto}
.pvw{overflow-x:auto;margin-bottom:10px;border-radius:8px;border:1px solid rgba(212,175,55,.2)}
.pvw table{width:100%;border-collapse:collapse;font-size:11px}
.pvw th{padding:6px 9px;background:rgba(212,175,55,.1);color:var(--gold);text-transform:uppercase;letter-spacing:1px;font-size:9px;text-align:left;border-bottom:1px solid rgba(212,175,55,.2)}
.pvw td{padding:6px 9px;color:var(--tx);border-bottom:1px solid rgba(255,255,255,.04)}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;display:flex;align-items:center;justify-content:center;padding:20px;backdrop-filter:blur(6px)}
.mbox{background:#111118;border:1px solid var(--gdim);border-radius:16px;padding:26px 20px;max-width:340px;width:100%;position:relative;text-align:center}
.mclose{position:absolute;top:12px;right:14px;background:none;border:none;color:var(--txd);font-size:22px;cursor:pointer}
.qrbox{background:#fff;border-radius:10px;padding:13px;display:inline-block;margin:14px 0}
.psheet{display:none}
@media print{body>*{display:none!important}.psheet{display:block!important;background:#fff}}
.slbl{font-size:9px;color:#5a4a3a;letter-spacing:2px;text-transform:uppercase;margin:12px 0 7px}
.row{display:flex;gap:10px}
.center{text-align:center}
.empty{text-align:center;padding:40px 20px;border:1px solid rgba(212,175,55,.1);border-radius:12px;color:#5a4a3a;font-size:13px}
.laste{display:flex;align-items:center;gap:11px;padding:11px 13px;margin-bottom:13px;background:var(--gfaint);border:1px solid var(--gdim);border-radius:8px}
.ibnr{margin:0 14px 10px;padding:10px 13px;background:rgba(212,175,55,.08);border:1px solid var(--gdim);border-radius:8px;display:none;align-items:center;gap:10px}
.itxt{flex:1;font-size:11px;color:#c0a860;line-height:1.5}
.footer{border-top:1px solid rgba(212,175,55,.08);padding:8px 16px;padding-bottom:max(8px,env(safe-area-inset-bottom));display:flex;justify-content:space-between;background:rgba(0,0,0,.4);flex-shrink:0}
.ftr{font-size:9px;color:var(--txm);letter-spacing:1px;text-transform:uppercase}
.toast{position:fixed;bottom:76px;left:50%;transform:translateX(-50%);background:rgba(12,12,12,.96);border:1px solid var(--gdim);border-radius:8px;padding:9px 16px;font-size:12px;color:var(--tx);z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="app">
  <div class="hdr">
    <div style="display:flex;align-items:flex-start;justify-content:space-between">
      <div>
        <div class="hdr-sub">Wedding Reception</div>
        <div class="hdr-ttl" id="hTtl">Guest Entry System</div>
        <div class="hdr-meta" id="hMeta"></div>
      </div>
      <div style="font-size:10px;color:var(--txm)" id="hDate"></div>
    </div>
  </div>
  <div class="tabs">
    <button class="tab on" id="t0" onclick="go(0)">&#x2B21; Check-In</button>
    <button class="tab" id="t1" onclick="go(1)">Families</button>
    <button class="tab" id="t2" onclick="go(2)">Report</button>
    <button class="tab" id="t3" onclick="go(3)">Settings</button>
  </div>
  <div class="ctrs">
    <div class="ctr"><div class="cv" id="cF">0</div><div class="cs" id="cFs">of 0</div><div class="cl">Checked In</div></div>
    <div class="ctr"><div class="cv" id="cG">0</div><div class="cs">&nbsp;</div><div class="cl">Inside Now</div></div>
    <div class="ctr"><div class="cv" id="cX">0</div><div class="cs">&nbsp;</div><div class="cl">Exited</div></div>
    <div class="ctr"><div class="cv" id="cR">0</div><div class="cs">&nbsp;</div><div class="cl">Remaining</div></div>
  </div>
  <div id="iBnr" class="ibnr">
    <div class="itxt" id="iTxt"></div>
    <button style="background:none;border:none;color:var(--txd);font-size:18px;cursor:pointer;flex-shrink:0" onclick="document.getElementById('iBnr').style.display='none'">&#x2715;</button>
  </div>
  <div class="main" id="main"></div>
  <div class="footer">
    <div class="ftr">Wedding Entry</div>
    <div class="ftr" id="fDate"></div>
  </div>
</div>

<video id="camVid" playsinline muted style="display:none"></video>
<canvas id="camCvs" style="display:none"></canvas>

<!-- CAMERA OVERLAY -->
<div id="camOverlay" style="display:none;position:fixed;inset:0;z-index:300;background:#000;flex-direction:column">
  <div style="background:rgba(0,0,0,.8);padding:14px 16px;padding-top:max(14px,env(safe-area-inset-top));display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
    <div>
      <div id="camTitle" style="font-size:16px;color:#f0e6d3;font-family:Georgia,serif">Scan QR Code</div>
      <div id="camSub" style="font-size:11px;color:#7a6a5a;margin-top:2px">Point camera at guest QR card</div>
    </div>
    <button onclick="closeCamOverlay()" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#f0e6d3;font-size:13px;padding:8px 14px;cursor:pointer;font-family:Georgia,serif">&#x2715; Cancel</button>
  </div>
  <div style="flex:1;position:relative;overflow:hidden">
    <div id="camVidWrap" style="width:100%;height:100%;background:#000"></div>
    <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none">
      <div style="width:65vw;max-width:280px;aspect-ratio:1;position:relative">
        <div id="cfTL" style="position:absolute;top:0;left:0;width:24px;height:24px;border-top:3px solid #d4af37;border-left:3px solid #d4af37"></div>
        <div id="cfTR" style="position:absolute;top:0;right:0;width:24px;height:24px;border-top:3px solid #d4af37;border-right:3px solid #d4af37"></div>
        <div id="cfBL" style="position:absolute;bottom:0;left:0;width:24px;height:24px;border-bottom:3px solid #d4af37;border-left:3px solid #d4af37"></div>
        <div id="cfBR" style="position:absolute;bottom:0;right:0;width:24px;height:24px;border-bottom:3px solid #d4af37;border-right:3px solid #d4af37"></div>
        <div id="cfLine" style="position:absolute;left:0;right:0;height:2px;top:50%;background:linear-gradient(90deg,transparent,#d4af37,transparent);box-shadow:0 0 8px #d4af37;animation:scanline 2s ease-in-out infinite"></div>
      </div>
    </div>
    <div id="camFlashOv" style="position:absolute;inset:0;opacity:0;pointer-events:none;transition:opacity .1s"></div>
  </div>
  <div style="background:rgba(0,0,0,.8);padding:12px 16px;padding-bottom:max(12px,env(safe-area-inset-bottom));flex-shrink:0">
    <div id="camOverlayStat" style="font-size:12px;color:#d4af37;text-align:center;font-family:Georgia,serif;margin-bottom:8px">Starting camera...</div>
    <button onclick="fullRestartCam()" style="display:block;width:100%;padding:10px;background:transparent;border:1px solid rgba(212,175,55,.35);border-radius:7px;color:#d4af37;font-size:11px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:Georgia,serif">&#x1F504; Restart Camera</button>
  </div>
</div>

<!-- QR MODAL -->
<div class="mbg" id="qrMod" style="display:none" onclick="if(event.target===this)closeQR()">
  <div class="mbox">
    <button class="mclose" onclick="closeQR()">&#x2715;</button>
    <div style="font-size:9px;color:#a09070;letter-spacing:3px;text-transform:uppercase;margin-bottom:5px">Family QR Code</div>
    <div style="font-size:17px;color:var(--tx);margin-bottom:3px" id="qrNm"></div>
    <div style="font-size:11px;color:var(--txd);margin-bottom:3px" id="qrSb"></div>
    <div style="font-size:12px;color:var(--gold);font-family:var(--m);letter-spacing:2px;margin-bottom:4px" id="qrId"></div>
    <div class="qrbox"><div id="qrCvs"></div></div>
    <div style="font-size:10px;color:var(--txd);margin-bottom:16px">Present at entrance</div>
    <div class="row" style="justify-content:center;gap:10px">
      <button class="bsm be" onclick="dlQR()">&#x2193; Save</button>
      <button class="bsm be" onclick="printQR()">Print</button>
    </div>
  </div>
</div>
<div class="psheet" id="pSheet"></div>

<!-- LOGIN OVERLAY -->
<div id="loginOverlay" style="position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#0a0a0f,#1a0a1a,#0a0f1a);display:flex;align-items:center;justify-content:center;padding:20px;font-family:Georgia,serif">
  <div style="width:100%;max-width:340px;background:rgba(255,255,255,.04);border:1px solid rgba(212,175,55,.3);border-radius:14px;padding:32px 24px;position:relative">
    <div style="position:absolute;top:9px;left:9px;width:14px;height:14px;border-top:2px solid #d4af37;border-left:2px solid #d4af37"></div>
    <div style="position:absolute;top:9px;right:9px;width:14px;height:14px;border-top:2px solid #d4af37;border-right:2px solid #d4af37"></div>
    <div style="position:absolute;bottom:9px;left:9px;width:14px;height:14px;border-bottom:2px solid #d4af37;border-left:2px solid #d4af37"></div>
    <div style="position:absolute;bottom:9px;right:9px;width:14px;height:14px;border-bottom:2px solid #d4af37;border-right:2px solid #d4af37"></div>
    <div style="text-align:center;margin-bottom:26px">
      <div style="font-size:10px;color:#d4af37;letter-spacing:3px;text-transform:uppercase;margin-bottom:6px">Wedding Reception</div>
      <div style="font-size:21px;color:#f0e6d3;font-weight:normal;margin-bottom:4px">Guest Entry System</div>
      <div style="font-size:11px;color:#7a6a5a">Authorised Staff Only</div>
    </div>

</div>
<div class="toast" id="toast"></div>

<script>
// ============================================================
// STATE
// ============================================================
var FK='wed_f5', EK='wed_e5', WK='wed_w1';
var _sa=null; try{_sa=JSON.parse(localStorage.getItem('wed_auth1')||'null');}catch(e){}
var CREDS = (_sa&&_sa.u&&_sa.p) ? _sa : {u:'admin',p:'wedding2026'};

var FAM=[], ENT=[];
try{FAM=JSON.parse(localStorage.getItem(FK)||'[]');}catch(e){}
try{ENT=JSON.parse(localStorage.getItem(EK)||'[]');}catch(e){}
var WI={bride:'',groom:'',brideF:'',groomF:'',venue:'',wdate:'',orgPhone:''};
try{Object.assign(WI,JSON.parse(localStorage.getItem(WK)||'{}'));}catch(e){}

var TAB=0, STEP='scan', MF=null, DUP=false, VIS=1, LAST=ENT[0]||null;
var PREV=[], PERR='', SMODE='camera', AMODE='in', AQR=null;
var CS=null, CRAF=null, CON=false, LSCAN=0;
var TEST_MODE=false, TEST_FAM_ID=null;

function sF(){localStorage.setItem(FK,JSON.stringify(FAM));}
function sE(){localStorage.setItem(EK,JSON.stringify(ENT));}
function sW(){localStorage.setItem(WK,JSON.stringify(WI));}

// ============================================================
// AUTH
// ============================================================
function doLogin(){
  var usr=(document.getElementById('lusr').value||'').trim().toLowerCase();
  var pwd=(document.getElementById('lpwd').value||'').trim();
  var err=document.getElementById('loginErr');
  err.style.display='none';
  if(!usr||!pwd){err.textContent='Please enter username and password.';err.style.display='block';return;}
  if(usr===CREDS.u.toLowerCase()&&pwd===CREDS.p){
    sessionStorage.setItem('wed_sess','1');
    document.getElementById('loginOverlay').style.display='none';
    render();
  } else {
    err.textContent='Incorrect username or password.';
    err.style.display='block';
    document.getElementById('lpwd').value='';
    document.getElementById('lpwd').focus();
  }
}
function togglePwd(){
  var i=document.getElementById('lpwd'), e=document.getElementById('pwdEye');
  i.type=i.type==='password'?'text':'password';
  e.innerHTML=i.type==='password'?'&#x1F441;':'&#x1F648;';
}
function doLogout(){
  sessionStorage.removeItem('wed_sess');
  document.getElementById('loginOverlay').style.display='flex';
  document.getElementById('lusr').value='';
  document.getElementById('lpwd').value='';
  document.getElementById('loginErr').style.display='none';
  stopCam();
}
function saveCredentials(){
  var usr=(document.getElementById('sUsr').value||'').trim();
  var pwd=document.getElementById('sPwd').value||'';
  var pwd2=document.getElementById('sPwd2').value||'';
  var msg=document.getElementById('pwdMsg');
  if(!usr){msg.textContent='Username cannot be empty.';msg.style.color='#e05555';msg.style.display='block';return;}
  if(pwd&&pwd.length<4){msg.textContent='Password must be at least 4 chars.';msg.style.color='#e05555';msg.style.display='block';return;}
  if(pwd&&pwd!==pwd2){msg.textContent='Passwords do not match.';msg.style.color='#e05555';msg.style.display='block';return;}
  CREDS={u:usr,p:pwd||CREDS.p};
  localStorage.setItem('wed_auth1',JSON.stringify(CREDS));
  document.getElementById('sPwd').value='';
  document.getElementById('sPwd2').value='';
  msg.textContent='Saved!';msg.style.color='#5eb87a';msg.style.display='block';
  toast('Credentials updated');
  setTimeout(function(){msg.style.display='none';},3000);
}

// ============================================================
// UTILS
// ============================================================
var _uc=0;
function uid(){_uc++;return 'FAM-'+Date.now().toString(36).slice(-4).toUpperCase()+_uc.toString(36).padStart(3,'0').toUpperCase();}
function fT(ts){return new Date(ts).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:true});}
function fD(ts){return new Date(ts).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fDay(ts){return new Date(ts).getDate();}
function fMon(ts){return new Date(ts).toLocaleDateString('en-US',{month:'long'});}
function fYr(ts){return new Date(ts).getFullYear();}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function getRemaining(e){return (e.visitors||0)-(e.exitedCount||0);}
function escH(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

// ============================================================
// HEADER / COUNTERS
// ============================================================
function tick(){
  var d=fD(Date.now());
  document.getElementById('hDate').textContent=d;
  document.getElementById('fDate').textContent=d;
  var couple=(WI.bride||WI.groom)?(WI.bride||'')+(WI.bride&&WI.groom?' & ':'')+(WI.groom||''):'';
  document.getElementById('hTtl').textContent=couple||'Guest Entry System';
  var meta=[];
  if(WI.venue) meta.push(WI.venue);
  if(WI.wdate) meta.push(new Date(WI.wdate+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}));
  document.getElementById('hMeta').textContent=meta.join('  ');
  var tIn=ENT.reduce(function(s,e){return s+e.visitors;},0);
  var tEx=ENT.reduce(function(s,e){return s+(e.exitedCount||0);},0);
  document.getElementById('cF').textContent=ENT.length;
  document.getElementById('cFs').textContent='of '+FAM.length;
  document.getElementById('cG').textContent=Math.max(0,tIn-tEx);
  document.getElementById('cX').textContent=tEx;
  document.getElementById('cR').textContent=Math.max(0,FAM.length-ENT.length);
}

// ============================================================
// NAVIGATION
// ============================================================
function go(n){
  TAB=n;
  [0,1,2,3].forEach(function(i){document.getElementById('t'+i).classList.toggle('on',i===n);});
  STEP='scan'; PREV=[]; PERR='';
  if(n!==0) stopCam();
  render();
}
function render(){
  tick();
  if(TAB===0) rScan();
  else if(TAB===1) rFam();
  else if(TAB===2) rRep();
  else rSet();
}

// ============================================================
// CAMERA
// ============================================================
function getVid(){return document.getElementById('camVid');}
function getCvs(){return document.getElementById('camCvs');}
function setOvStat(msg,col){var el=document.getElementById('camOverlayStat');if(el){el.textContent=msg;el.style.color=col||'#d4af37';}}

function openCamOverlay(){
  var ov=document.getElementById('camOverlay');
  if(!ov) return;
  ov.style.display='flex';
  var wrap=document.getElementById('camVidWrap');
  var v=getVid();
  if(wrap&&v){
    v.style.cssText='position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;';
    if(v.parentElement!==wrap) wrap.appendChild(v);
  }
  var title=document.getElementById('camTitle');
  var sub=document.getElementById('camSub');
  if(STEP==='testcam'){
    if(title) title.textContent='Camera Self Test';
    if(sub) sub.textContent='Scan the test QR code below';
  } else {
    if(title) title.textContent=AMODE==='in'?'Check In Guest':'Check Out Guest';
    if(sub) sub.textContent='Point at guest QR card';
    var col=AMODE==='out'?'#7b9cff':'#d4af37';
    ['cfTL','cfTR','cfBL','cfBR'].forEach(function(id){var el=document.getElementById(id);if(el) el.style.borderColor=col;});
    var ln=document.getElementById('cfLine');
    if(ln){ln.style.background='linear-gradient(90deg,transparent,'+col+',transparent)';ln.style.boxShadow='0 0 8px '+col;}
  }
  startCam();
}

function closeCamOverlay(){
  var ov=document.getElementById('camOverlay');
  if(ov) ov.style.display='none';
  stopCam();
  if(STEP==='testcam') endSelfTest(false);
  else {STEP='scan'; render();}
}

function fullRestartCam(){stopCam();setTimeout(startCam,300);}

async function startCam(){
  if(CON) return;
  var v=getVid(); if(!v) return;
  if(typeof jsQR==='undefined'){
    setOvStat('Loading scanner...','#d4af37');
    var w=0;
    var t=setInterval(function(){
      w+=400;
      if(typeof jsQR!=='undefined'){clearInterval(t);startCam();return;}
      if(w>=6000){clearInterval(t);setOvStat('Use Type ID - needs internet','#e05555');}
    },400);
    return;
  }
  if(!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia){setOvStat('Camera not supported','#e05555');return;}
  setOvStat('Starting camera...','#d4af37');
  try{
    CS=await navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}}});
    v.srcObject=CS; v.setAttribute('playsinline','true'); v.muted=true;
    await v.play(); CON=true;
    setOvStat('Ready - point at QR code','#d4af37');
    scanLoop();
  }catch(err){
    CON=false;
    if(CS){try{CS.getTracks().forEach(function(t){t.stop()});}catch(e){} CS=null;}
    try{v.srcObject=null;}catch(e){}
    var m='Camera error - tap Restart';
    if(err.name==='NotAllowedError') m='Camera denied - allow in browser settings';
    if(err.name==='NotFoundError') m='No camera found on this device';
    if(err.name==='NotReadableError') m='Camera busy - close other apps';
    setOvStat(m,'#e05555');
  }
}

function stopCam(){
  CON=false;
  if(CRAF){cancelAnimationFrame(CRAF);CRAF=null;}
  if(CS){try{CS.getTracks().forEach(function(t){t.stop()});}catch(e){} CS=null;}
  try{var v2=getVid();if(v2){v2.pause();v2.srcObject=null;}}catch(e){}
}

function scanLoop(){
  if(!CON) return;
  var v=getVid(), cvs=getCvs();
  if(!v||!cvs){stopCam();return;}
  if(v.readyState!==v.HAVE_ENOUGH_DATA||v.videoWidth===0){CRAF=requestAnimationFrame(scanLoop);return;}
  try{
    var ctx=cvs.getContext('2d',{willReadFrequently:true});
    cvs.width=v.videoWidth; cvs.height=v.videoHeight;
    ctx.drawImage(v,0,0,cvs.width,cvs.height);
    var img=ctx.getImageData(0,0,cvs.width,cvs.height);
    var code=jsQR(img.data,img.width,img.height,{inversionAttempts:'dontInvert'});
    if(!code) code=jsQR(img.data,img.width,img.height,{inversionAttempts:'onlyInvert'});
    if(code&&code.data&&Date.now()-LSCAN>1500){LSCAN=Date.now();onScan(code.data.trim());return;}
  }catch(e){}
  CRAF=requestAnimationFrame(scanLoop);
}

function onScan(code){
  try{
    var fl=document.getElementById('camFlashOv');
    if(fl){fl.style.background=AMODE==='in'?'rgba(94,184,122,.4)':'rgba(123,156,255,.4)';fl.style.opacity='1';setTimeout(function(){fl.style.opacity='0';},300);}
  }catch(e){}
  setOvStat('QR Detected!','#5eb87a');
  CON=false; if(CRAF){cancelAnimationFrame(CRAF);CRAF=null;}
  setTimeout(function(){
    var ov=document.getElementById('camOverlay');
    if(ov) ov.style.display='none';
    stopCam();
    processCode(code);
  },400);
}

// ============================================================
// CODE PROCESSING
// ============================================================
function processCode(code){
  code=code.trim().toUpperCase();
  var fam=FAM.find(function(f){return f.id.toUpperCase()===code;});
  if(!fam){MF=code;STEP='notfound';render();return;}
  if(TEST_MODE&&fam.id===TEST_FAM_ID){STEP='testresult';MF=fam;render();return;}
  MF=fam;
  if(AMODE==='in'){
    DUP=!!ENT.find(function(e){return e.familyId===fam.id;});
    VIS=1; STEP='confirm'; render();
  } else {
    var ent=ENT.find(function(e){return e.familyId===fam.id;});
    if(!ent){STEP='notchecked';render();return;}
    if(getRemaining(ent)<=0){STEP='allexited';render();return;}
    VIS=1; STEP='confirmexit'; render();
  }
}

// ============================================================
// SELF TEST
// ============================================================
function startSelfTest(){
  TEST_MODE=true; TEST_FAM_ID='TEST-CAMCHECK';
  FAM=FAM.filter(function(f){return f.id!==TEST_FAM_ID;});
  FAM.unshift({id:TEST_FAM_ID,name:'Camera Test',table:'Test',phone:'',maxGuests:1});
  STEP='testcam'; TAB=0;
  [0,1,2,3].forEach(function(i){document.getElementById('t'+i).classList.toggle('on',i===0);});
  render();
}
function endSelfTest(passed){
  FAM=FAM.filter(function(f){return f.id!==TEST_FAM_ID;});
  ENT=ENT.filter(function(e){return e.familyId!==TEST_FAM_ID;});
  sE(); TEST_MODE=false; TEST_FAM_ID=null; STEP='scan'; MF=null; DUP=false; VIS=1;
  render();
  if(passed) toast('Camera test passed! Ready for guests.');
}
function openSelfTest(){startSelfTest();}

// ============================================================
// GIFT TRACKING
// ============================================================
function saveGift(familyId,amount,type){
  var idx=ENT.findIndex(function(e){return e.familyId===familyId;});
  if(idx<0) return;
  var amt=parseFloat(amount)||0;
  if(type==='checkin') ENT[idx].giftAmountIn=amt;
  else ENT[idx].giftAmountOut=amt;
  ENT[idx].giftTotal=(ENT[idx].giftAmountIn||0)+(ENT[idx].giftAmountOut||0);
  sE();
  if(amt>0) toast('Gift Rs.'+amt.toLocaleString('en-IN')+' recorded!');
}
function saveGiftIn(){
  var inp=document.getElementById('giftInAmt');
  var msg=document.getElementById('giftInMsg');
  if(!inp||!LAST) return;
  var amt=parseFloat(inp.value)||0;
  saveGift(LAST.familyId,amt,'checkin');
  if(msg) msg.textContent=amt>0?'Rs.'+amt.toLocaleString('en-IN')+' saved!':'No gift recorded.';
}
function saveGiftOut(){
  var inp=document.getElementById('giftOutAmt');
  var msg=document.getElementById('giftOutMsg');
  if(!inp||!LAST) return;
  var amt=parseFloat(inp.value)||0;
  saveGift(LAST.familyId,amt,'checkout');
  if(msg) msg.textContent=amt>0?'Rs.'+amt.toLocaleString('en-IN')+' saved!':'No gift recorded.';
}

// ============================================================
// FOOD PREFERENCE
// ============================================================
function buildFoodUrl(fam){
  // Always use GitHub Pages URL — never local file path
  var base = 'https://narender13in-hue.github.io/Wedding-Guest-Entry-App/';
  var couple=(WI.bride||'')+(WI.bride&&WI.groom?' & ':'')+(WI.groom||'');
  return base+'food.html'
    +'?id='+encodeURIComponent(fam.id)
    +'&name='+encodeURIComponent(fam.name)
    +'&table='+encodeURIComponent(fam.table||'')
    +'&couple='+encodeURIComponent(couple)
    +'&venue='+encodeURIComponent(WI.venue||'')
    +'&date='+encodeURIComponent(WI.wdate||'')
    +'&org='+encodeURIComponent(WI.orgPhone||'');
}

function sendFoodLink(famId){
  var fam=FAM.find(function(f){return f.id===famId;});
  if(!fam) return;
  var url=buildFoodUrl(fam);
  var phone=(fam.phone||'').replace(/[^0-9]/g,'');
  var msg = 'Dear ' + fam.name + ',' +
    '\n\nYou are cordially invited to our Wedding Reception! 💍' +
    '\n\nKindly let us know your meal preference by tapping the link below:' +
    '\n\n🥗 Vegetarian' +
    '\n🍗 Non-Vegetarian' +
    '\n\nTap here to select: ' + url +
    '\n\nThank you! 🙏';
  var waUrl='https://wa.me/'+phone+'?text='+encodeURIComponent(msg);
  window.open(waUrl,'_blank');
}

function sendAllFoodLinks(){
  var pending=FAM.filter(function(f){return !f.foodPref;});
  if(pending.length===0){toast('All families have responded!');return;}
  if(!confirm('Send food preference link to '+pending.length+' families via WhatsApp?')) return;
  var i=0;
  function next(){
    if(i>=pending.length){toast('Done! '+pending.length+' links sent.');return;}
    sendFoodLink(pending[i].id);
    i++;
    setTimeout(next,1500);
  }
  next();
}

function setFoodPref(famId,pref){
  if(!pref) return;
  var idx=FAM.findIndex(function(f){return f.id===famId;});
  if(idx<0) return;
  FAM[idx].foodPref=pref;
  sF();
  render();
  toast('Food preference: '+pref);
}

      var ex=AMODE==='out';
      h+='<button onclick="openCamOverlay()" style="display:block;width:100%;padding:22px 16px;margin-bottom:12px;background:rgba(0,0,0,.5);border:2px solid '+(ex?'rgba(123,156,255,.5)':'rgba(212,175,55,.5)')+';border-radius:12px;cursor:pointer;text-align:center;font-family:Georgia,serif">';

function setSMode(m){if(m==='manual')stopCam();SMODE=m;render();}
function setAMode(m){stopCam();AMODE=m;render();}
function chv(d){VIS=Math.max(1,VIS+d);if(STEP==='confirm')render();else{var e=document.getElementById('vn');if(e)e.textContent=VIS;}}
function chvX(d,max){VIS=Math.max(1,Math.min(max||99,VIS+d));var e=document.getElementById('vx');if(e)e.textContent=VIS;}
function doManual(){var inp=document.getElementById('ci');var code=(inp?inp.value:'').trim().toUpperCase();if(!code)return;processCode(code);}
function quickChk(id){
  var fam=FAM.find(function(f){return f.id===id;});if(!fam)return;
  MF=fam;
  if(AMODE==='in'){DUP=!!ENT.find(function(e){return e.familyId===id;});VIS=1;STEP='confirm';render();}
  else{var ent=ENT.find(function(e){return e.familyId===id;});if(!ent){STEP='notchecked';render();return;}if(getRemaining(ent)<=0){STEP='allexited';render();return;}VIS=1;STEP='confirmexit';render();}
}
function doIn(){
  if(DUP||!MF) return;
  if(MF.maxGuests&&VIS>MF.maxGuests){toast('Cannot check in - exceeds guest limit');return;}
  var e={id:Date.now(),familyId:MF.id,familyName:MF.name,table:MF.table,phone:MF.phone||'',
    visitors:VIS,timestamp:Date.now(),exitTime:null,exitedCount:0,exitEvents:[],_la:'in'};
  ENT.unshift(e);LAST=e;sE();STEP='donein';render();
}
function doOut(){
  if(!MF) return;
  var idx=ENT.findIndex(function(e){return e.familyId===MF.id;});if(idx<0)return;
  var n=VIS||1;
  ENT[idx].exitedCount=(ENT[idx].exitedCount||0)+n;
  if(!ENT[idx].exitEvents) ENT[idx].exitEvents=[];
  ENT[idx].exitEvents.push({count:n,time:Date.now()});
  if(ENT[idx].exitedCount>=ENT[idx].visitors){ENT[idx].exitedCount=ENT[idx].visitors;ENT[idx].exitTime=Date.now();}
  ENT[idx]._la='exit';LAST=ENT[idx];sE();STEP='doneout';render();
}
function rst(){if(TEST_MODE){endSelfTest(false);return;}STEP='scan';MF=null;DUP=false;VIS=1;render();}

function onFile(inp){if(inp.files[0])parseCSV(inp.files[0]);inp.value='';}
function parseCSVLine(line){
  var r=[],cur='',q=false;
  for(var i=0;i<line.length;i++){var ch=line[i];if(ch==='"'){q=!q;}else if(ch===','&&!q){r.push(cur);cur='';}else{cur+=ch;}}
  r.push(cur);return r.map(function(s){return s.replace(/^"|"$/g,'').trim();});
}
function parseCSV(file){
  var rd=new FileReader();
  rd.onload=function(e){
    var lines=e.target.result.split(/\r?\n/).filter(function(l){return l.trim();});
    if(lines.length<2){PERR='CSV needs a header row and at least one data row.';PREV=[];render();return;}
    var hdr=lines[0].split(',').map(function(h){return h.trim().toLowerCase().replace(/['"]/g,'');});
    var ni=hdr.indexOf('name'),pi=hdr.indexOf('phone'),ti=hdr.indexOf('table'),mi=hdr.indexOf('maxguests');
    if(ni===-1){PERR='Missing column "name".';PREV=[];render();return;}
    var rows=[],seenNames=new Set(),dupesFile=[],ts=Date.now();
    for(var i=1;i<lines.length;i++){
      var cols=parseCSVLine(lines[i]);
      var name=(cols[ni]||'').trim();if(!name)continue;
      var nl=name.toLowerCase();
      if(seenNames.has(nl)){dupesFile.push(name);continue;}
      seenNames.add(nl);
      var rowId='FAM-'+ts.toString(36).slice(-4).toUpperCase()+i.toString(36).padStart(3,'0').toUpperCase();
      rows.push({id:rowId,name:name,phone:pi>=0?(cols[pi]||'').trim():'',table:ti>=0?(cols[ti]||'').trim():'',maxGuests:mi>=0?parseInt(cols[mi])||0:0});
    }
    if(!rows.length){PERR='No valid rows found.';PREV=[];render();return;}
    var dupesExist=rows.filter(function(r){return FAM.some(function(f){return f.name.toLowerCase()===r.name.toLowerCase();});}).map(function(r){return r.name;});
    var w='';
    if(dupesFile.length>0) w+='⚠ Duplicates skipped from CSV: '+dupesFile.join(', ')+'. ';
    if(dupesExist.length>0) w+='⚠ Already in list: '+dupesExist.join(', ')+'.';
    PERR=w;
    var final=rows.filter(function(r){return !FAM.some(function(f){return f.name.toLowerCase()===r.name.toLowerCase();});});
    if(!final.length){PERR='⚠ All families already exist.';PREV=[];render();return;}
    PREV=final;render();
  };
  rd.readAsText(file);
}

// ============================================================
function expCSV(){
  function q(v){return '"'+String(v||'').replace(/"/g,'""')+'"';}
  function lastExitTs(e){if(e.exitEvents&&e.exitEvents.length>0)return e.exitEvents[e.exitEvents.length-1].time;if(e.exitTime)return e.exitTime;return null;}

  var wi=[];
  if(WI.bride||WI.groom) wi.push('Wedding:,'+q((WI.bride||'')+(WI.bride&&WI.groom?' & ':'')+(WI.groom||'')));
  if(WI.brideF) wi.push("Bride's Family:,"+q(WI.brideF));
  if(WI.groomF) wi.push("Groom's Family:,"+q(WI.groomF));
  if(WI.venue) wi.push('Venue:,'+q(WI.venue));
  if(WI.wdate) wi.push('Wedding Date:,'+q(new Date(WI.wdate+'T00:00:00').toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'})));
  wi.push('Exported:,'+q(new Date().toLocaleString()));
  wi.push('');

  var cols=['Family ID','Family Name','Table','Phone','Food Preference',
    'Total Guests','Exited','Still Inside',
    'Entry Day','Entry Month','Entry Year','Entry Time',
    'Exit Day','Exit Month','Exit Year','Exit Time',
    'Duration (mins)','Status',
    'Gift on Arrival (Rs.)','Gift on Exit (Rs.)','Total Gift (Rs.)'];

  var rows=ENT.map(function(e){
    var famFP=FAM.find(function(ff){return ff.id===e.familyId;});
    var fp=famFP?(famFP.foodPref||'Not responded'):'Not responded';
    var ed=e.timestamp, lxd=lastExitTs(e);
    var rem=e.visitors-(e.exitedCount||0);
    var status=rem<=0?'All Exited':(e.exitedCount||0)>0?'Partial Exit':'Still Inside';
    var dur=lxd?Math.round((lxd-ed)/60000):'';
    var gIn=e.giftAmountIn||0, gOut=e.giftAmountOut||0, gTotal=e.giftTotal||0;
    return [
      q(e.familyId),q(e.familyName),q(e.table||''),q(e.phone||''),q(fp),
      e.visitors,e.exitedCount||0,rem,
      fDay(ed),q(fMon(ed)),fYr(ed),q(fT(ed)),
      lxd?fDay(lxd):'',lxd?q(fMon(lxd)):'',lxd?fYr(lxd):'',lxd?q(fT(lxd)):'',
      dur,q(status),
      gIn||'',gOut||'',gTotal||''
    ].join(',');
  });

  var tGift=ENT.reduce(function(s,e){return s+(e.giftTotal||0);},0);
  rows.push('');
  rows.push('TOTAL GIFT RECEIVED,,,,,,,,,,,,,,,,,,,,Rs.'+tGift.toLocaleString('en-IN'));

  var couple=(WI.bride||WI.groom)?(WI.bride||'')+(WI.bride&&WI.groom?'_&_':'')+(WI.groom||''):'Wedding';
  var fname=couple.replace(/\s+/g,'_')+'_Guest_Report.csv';
  var content=wi.join('\n')+cols.join(',')+'\n'+rows.join('\n');
  var b=new Blob(['\uFEFF'+content],{type:'text/csv;charset=utf-8;'});
  var u=URL.createObjectURL(b);var a=document.createElement('a');a.href=u;a.download=fname;a.click();URL.revokeObjectURL(u);
  toast('Report exported!');
}
